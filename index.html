<script>

    // ===== LOGIN CONFIG =====
const USERNAME = "1234";
const PASSWORD = "1234";

// วันหมดอายุ: 6 กรกฎาคม พ.ศ. 2569 (พ.ศ.)
const EXPIRE_DATE = new Date(2026, 6, 06); // เดือนนับจาก 0 → 3 = April


  function showExpireDate(){
  const d = EXPIRE_DATE;

  // แปลงเป็น พ.ศ.
  const thaiYear = d.getFullYear() + 543;

  const text = `วันหมดอายุ: ${d.getDate()}/${d.getMonth()+1}/${thaiYear}`;

  document.getElementById("expireBox").innerText = text;
}


function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === USERNAME && p === PASSWORD){

    // เช็ควันหมดอายุ
    const now = new Date();

    if(now > EXPIRE_DATE){
      document.getElementById("loginError").innerText = "หมดอายุแล้ว";
      return;
    }

    document.getElementById("loginScreen").style.display = "none";
    showExpireDate(); // แสดงวันหมดอายุบนหน้าโปรแกรม

  }else{
    document.getElementById("loginError").innerText = "user หรือ pass ผิด";
  }
}

/* ===== CONSTANTS ===== */
const ROWS=6,COLS=40;
const CELL_BIG=12,CELL_BEAD=14;
const DOT=5,FONT=8,MAX_MARK=999;

/* ===== CENTER ===== */
function centerOffset(c,cell){
  return{
    ox:Math.max(10,(c.width-COLS*cell)/2),
    oy:Math.max(10,(c.height-ROWS*cell)/2)
  }
}



/* ===== DNA LOGIC (เดิม 100%) ===== */
const dna_follow=h=>h.at(-1)||null;
const dna_oppo=h=>h.length?(h.at(-1)==="P"?"B":"P"):null;
const dna_2same=h=>h.length>=2&&h.at(-1)===h.at(-2)?h.at(-1):dna_oppo(h);
const dna_chop = h => {
  if(h.length < 2) return null;

  const last = h.at(-1);
  const prev = h.at(-2);

  // ถ้าเริ่มเป็น run → ไม่ chop
  if(last === prev){
    return last; // ตามแทน
  }

  // ถ้าเป็น chop → เล่น chop
  return last === "P" ? "B" : "P";
};

const dna_run3=h=>h.length>=3&&h.at(-1)===h.at(-2)&&h.at(-2)===h.at(-3)?h.at(-1):dna_oppo(h);

const dna_balance = h => {
  if(h.length < 2) return null;

  let p = 0, b = 0;

  for(let i = Math.max(0, h.length - 6); i < h.length; i++){
    if(h[i] === "P") p++;
    else if(h[i] === "B") b++;
  }

  return p <= b ? "P" : "B";
};

const dna_last5 = h => {
  if(h.length < 5) return null;

  const p = h.slice(-5).filter(v => v === "P").length;
  const b = h.slice(-5).filter(v => v === "B").length;

  if(p > b) return "P";
  if(b > p) return "B";
  return null; // 🔥 เท่ากัน = ไม่เล่น
};

const dna_cutrun=h=>h.length>=4&&new Set(h.slice(-4)).size===1?(h.at(-1)==="P"?"B":"P"):dna_follow(h);
const dna_trend = h => {
  if(h.length < 6) return null;

  const p = h.slice(-6).filter(v => v === "P").length;
  const b = h.slice(-6).filter(v => v === "B").length;

  if(p > b) return "P";
  if(b > p) return "B";
  return null;
};

const dna_anti2=h=>h.length>=2&&h.at(-1)===h.at(-2)?dna_oppo(h):h.at(-1);
const dna_anti1_2=h=>{
 if(h.length<2)return h.at(-1)||null;
 const a1=dna_oppo(h),
       a2=h.at(-1)===h.at(-2)?dna_oppo(h):h.at(-1);
 return a1===a2?a1:h.at(-1);
};
const dna_anti3=h=>h.length>=3&&h.at(-1)===h.at(-2)&&h.at(-2)===h.at(-3)?dna_oppo(h):h.at(-1);
const dna_entropy7 = h => {
  if (h.length < 7) return null;

  const last7 = h.slice(-7);

  let changes = 0;
  for (let i = 1; i < last7.length; i++) {
    if (last7[i] !== last7[i - 1]) changes++;
  }

  const p = last7.filter(x => x === "P").length;
  const b = last7.filter(x => x === "B").length;

  const last = h.at(-1);

  if (changes >= 5) return last === "P" ? "B" : "P";
  if (p > b) return "P";
  if (b > p) return "B";

  return null;
};

// ===== DNA 12 =====
const dna_zigzag = h => {

  if(h.length < 3) return null;

  const a = h.at(-3);
  const b = h.at(-2);
  const c = h.at(-1);

  // PBP หรือ BPB
  if(a !== b && b !== c){
      return c === "P" ? "B" : "P";
  }

  return null;
};

// ===== DNA 13 =====
const dna_momentum = h => {
  if(h.length < 8) return null;

  let score = 0;

  h.slice(-8).forEach(v=>{
    score += v==="P" ? 1 : -1;
  });

  if(score >= 2) return "P";
  if(score <= -2) return "B";

  return null;
};
// ===== DNA 14 =====
const dna_switch2 = h => {
  if(h.length < 2) return null;

  const a = h.at(-2);
  const b = h.at(-1);

  if(a !== b){
    return a;
  }

  return b;
};

// ===== DNA 15 =====
const dna_last3 = h => {
  if(h.length < 3) return null;

  const p = h.slice(-3).filter(x=>x==="P").length;
  const b = h.slice(-3).filter(x=>x==="B").length;

  if(p>b) return "P";
  if(b>p) return "B";

  return h.at(-1);
};
const SYSTEMS = [
  ["ตามน้ำ", dna_follow],
  ["สวนน้ำ", dna_oppo],
  ["สองตัวซ้ำ", dna_2same],
  ["ปิงปอง", dna_chop],
  ["สามตัวซ้ำ", dna_run3],
  ["สมดุล", dna_balance],
  ["ห้าตาล่าสุด", dna_last5],
  ["ตัดมังกร", dna_cutrun],
  ["เกาะเทรนด์", dna_trend],

  ["ANTI 1-2+", h => {
    if (h.length < 2) return h.at(-1) || null;

    const a1 = dna_oppo(h);
    const a2 = h.at(-1) === h.at(-2)
      ? dna_oppo(h)
      : h.at(-1);

    return a1 === a2 ? a1 : dna_oppo(h);
  }],

["DNA เอนโทรปี 7", dna_entropy7],

["DNA ZigZag", dna_zigzag],

["DNA Momentum", dna_momentum],

["DNA สลับ 2", dna_switch2],

["DNA 3 ตาล่าสุด", dna_last3]

];

class Engine{
 constructor(){
  this.h = []; // 🔥 ต้องมี

  this.play = Array(SYSTEMS.length).fill(0);
  this.win  = Array(SYSTEMS.length).fill(0);
  this.mark = [...Array(SYSTEMS.length)].map(()=>[]);
 }
 predict(){return SYSTEMS.map(s=>s[1](this.h))}
 update(v){
  const p=this.predict();this.h.push(v);
  p.forEach((x,i)=>{
    if(!x)return;
    this.play[i]++;
    x===v?(this.win[i]++,this.mark[i].push("/")):this.mark[i].push("x");
    if(this.mark[i].length>MAX_MARK)this.mark[i].shift();
  });
 }
 pair(i){
  if(!this.play[i])return[0,0];
  const p=Math.floor(this.win[i]/this.play[i]*100);
  return[p,100-p];
 }
 reset(){
  this.h=[];this.play.fill(0);this.win.fill(0);
  this.mark.forEach(m=>m.length=0);
 }
}

const eng=new Engine();

let bead=[];

/* ===== RADAR ===== */
function radar(){

  let p = 0, b = 0;

  const preds = eng.predict();

  let agree = 0;

const pCount = preds.filter(x => x === "P").length;
const bCount = preds.filter(x => x === "B").length;

agree = Math.max(pCount,bCount);

const agreeSide =
    pCount > bCount ? "P" :
    bCount > pCount ? "B" :
    "-";

  const agreePercent =
    Math.round((agree / SYSTEMS.length) * 100);

  preds.forEach((x,i)=>{
    if(!x) return;

    const [wp, wb] = eng.pair(i); // winrate P / B
    const weight = Math.max(wp, wb); // 🔥 ใช้ % สูงสุดเป็นน้ำหนัก

     // 🔥 ใส่ตรงนี้
    if(weight < 45) return;


    if(x === "P") p += weight;
    if(x === "B") b += weight;
  });

  const total = p + b || 1;

return {
  p: Math.round(p * 100 / total),
  b: Math.round(b * 100 / total),
  side: p > b ? "P" : b > p ? "B" : null,

  agree,
  agreePercent,
  agreeSide
};
}

/* ===== DRAW ===== */

const beadCanvas=document.getElementById("bead");

function draw(){

  drawBead();

  drawMiniBead();   // ← เพิ่มบรรทัดนี้

  renderSystems();

  renderQuickView();

  updateTop();

}


function drawBead(){
 const ctx=beadCanvas.getContext("2d");
 ctx.clearRect(0,0,9999,9999);
 const o=centerOffset(beadCanvas,CELL_BEAD);
 bead.forEach((v,i)=>{
  const r=i%ROWS,c=Math.floor(i/ROWS);if(c>=COLS)return;
  const x=o.ox+c*CELL_BEAD+CELL_BEAD/2;
  const y=o.oy+r*CELL_BEAD+CELL_BEAD/2;
  ctx.fillStyle=v==="P"?"#3b82f6":v==="B"?"#ef4444":"#22c55e";
  ctx.beginPath();ctx.arc(x,y,DOT,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fff";ctx.font=`bold ${FONT}px Arial`;
  ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(v,x,y);
 });
}

function drawMiniBead(){

    const cv=document.getElementById("miniBead");

    if(!cv) return;

    const ctx=cv.getContext("2d");

    ctx.clearRect(0,0,999,999);

const cell=22;
const rows=6;
const cols=11;
const start=Math.max(0,bead.length-(rows*cols));

    const data=bead.slice(start);

    let p=0,b=0,t=0;

    data.forEach(x=>{
        if(x==="P")p++;
        if(x==="B")b++;
        if(x==="T")t++;
    });

    document.getElementById("miniHeader").innerHTML=
    `
    <span style="color:#3b82f6">P${p}</span>
    <span style="color:#ef4444">B${b}</span>
    <span style="color:#22c55e">T${t}</span>
    <span>=${data.length}</span>
    `;

    data.forEach((v,i)=>{

        const r=i%rows;

        const c=Math.floor(i/rows);

        if(c>=cols)return;

       const x=11+c*cell;
       const y=11+r*cell;

        ctx.beginPath();

       ctx.arc(x,y,8,0,Math.PI*2);

        ctx.fillStyle=
            v==="P"
            ?"#3b82f6"
            :v==="B"
            ?"#ef4444"
            :"#22c55e";

        ctx.fill();

    });

}

function renderSystems(){
 const box=document.getElementById("systems");
 box.innerHTML="";
 const r=radar();

 const preds = eng.predict(); // ✅ เรียกครั้งเดียว

 SYSTEMS.forEach((s,i)=>{
  const [p,b]=eng.pair(i);

  let cls="sys-row";
  if(r.side==="P" && p>b)cls+=" hotP blink";
  if(r.side==="B" && b>p)cls+=" hotB blink";

  const row=document.createElement("div");
  row.className=cls;

row.innerHTML=`
 <div class="sys-name">${s[0]}</div>
 <div class="sys-bet">${preds[i]||""}</div>
 <div class="sys-pair">P ${p}% / B ${b}%</div>
 <div class="sys-hist">
   ${eng.mark[i].map(x=>{
     const cls = x === "/" ? "win" : "lose";
     return `<span class="${cls}">${x}</span>`;
   }).join("")}
 </div>
`;

box.appendChild(row);
 });
}

function updateTop(){
 const r=radar();
 const bar=document.getElementById("betBar");
 bar.textContent =
bar.textContent =
`P ${r.p}% | B ${r.b}% | ${r.agreeSide} ตรงกัน ${r.agree}/${SYSTEMS.length} (${r.agreePercent}%)`;
if(r.side===null){
  bar.className="bet-bar";
}else{
  bar.className = "bet-bar " + (r.side==="P"?"p":"b") + " slow-blink";
}
 const p=bead.filter(v=>v==="P").length;
 const b=bead.filter(v=>v==="B").length;
 const t=bead.filter(v=>v==="T").length;
document.getElementById("countOverlay").innerHTML = `
  <span class="count-badge count-p">P ${p}</span>
  <span class="count-badge count-b">B ${b}</span>
  <span class="count-badge count-t">T ${t}</span>
  <span class="count-badge count-total">= ${bead.length}</span>
`;
}
/* ===== ACTIONS ===== */
function play(v){
 bead.push(v);


 // ✅ กัน T ไม่ให้เข้า Engine
 if(v !== "T"){
   eng.update(v);
 }

 draw();
}


function undo(){
 if(!bead.length)return;
 bead.pop();
 eng.reset();

 bead.forEach(v=>{
   if(v !== "T"){
     eng.update(v);
   }
 });

 draw();
}

function clearAll(){
  if(!confirm("ต้องการล้างข้อมูลทั้งหมด?")) return;

  bead = [];
  eng.reset();
  draw();
}

function renderQuickView(){
  const box = document.getElementById("quickList");
  box.innerHTML = "";

  const preds = eng.predict();

  let arr = SYSTEMS.map((s,i)=>{
    const [p,b] = eng.pair(i);
    const bet = preds[i];

    if(!bet) return null;

    let percent = 0;
    if(bet === "P") percent = p;
    if(bet === "B") percent = b;

    return {
      name:s[0],
      bet,
      percent
    };
  }).filter(x=>x !== null);

  // เรียงจาก % สูงสุด
  arr.sort((a,b)=>b.percent - a.percent);

  // 🔥 เหลือแค่ Top 1
  const x = arr[0];
  if(!x) return;

  const row = document.createElement("div");
  row.className = "quick-row " + (x.bet === "P" ? "p" : "b") + " top1";

  row.innerHTML = `
    <div class="quick-name">${x.name}</div>
    <div class="quick-bet">${x.bet}</div>
    <div class="quick-per top1">${x.percent}%</div>
   `;

  box.appendChild(row);
}


draw();
